version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bus-complaints-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bususer}
      POSTGRES_PASSWORD: ${DB_PASS:-buspass}
      POSTGRES_DB: ${DB_NAME:-bus_complaints}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-bususer} -d ${DB_NAME:-bus_complaints}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bus-complaints-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bus.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
